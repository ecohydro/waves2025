name: Migrate Content to Sanity

on:
  workflow_dispatch:
    inputs:
      content_type:
        description: 'Content type to migrate'
        required: true
        default: 'all'
        type: choice
        options:
          - people
          - publications
          - news
          - all
      dry_run:
        description: 'Dry run (preview only, no changes)'
        required: false
        default: false
        type: boolean

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ vars.NEXT_PUBLIC_SANITY_PROJECT_ID || vars.SANITY_PROJECT_ID || secrets.SANITY_PROJECT_ID || '6r5yojda' }}
      NEXT_PUBLIC_SANITY_DATASET: ${{ vars.NEXT_PUBLIC_SANITY_DATASET || vars.SANITY_DATASET || secrets.SANITY_DATASET || 'production' }}
      NEXT_PUBLIC_SANITY_API_VERSION: ${{ vars.NEXT_PUBLIC_SANITY_API_VERSION || '2023-12-19' }}
      SANITY_API_EDITOR_TOKEN: ${{ secrets.SANITY_API_EDITOR_TOKEN || secrets.SANITY_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migration (dry run)
        if: ${{ inputs.dry_run == true }}
        run: npm run migrate:to-sanity:${{ inputs.content_type }}:dry

      - name: Run migration
        if: ${{ inputs.dry_run == false }}
        run: npm run migrate:to-sanity:${{ inputs.content_type }}

      - name: Summary
        run: |
          echo "## Migration Complete 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Content type:** ${{ inputs.content_type }}" >> $GITHUB_STEP_SUMMARY
          echo "**Dry run:** ${{ inputs.dry_run }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Content has been synced to Sanity. Changes should appear on the live site within a few minutes." >> $GITHUB_STEP_SUMMARY
